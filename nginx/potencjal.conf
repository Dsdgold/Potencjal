server {
    listen 80;
    server_name 46.225.131.52;

    root /var/www/potencjal;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to VAT White List API (Ministerstwo Finansow)
    location /api/vat/ {
        proxy_pass https://wl-api.mf.gov.pl/api/search/;
        proxy_set_header Host wl-api.mf.gov.pl;
        proxy_set_header Accept application/json;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
