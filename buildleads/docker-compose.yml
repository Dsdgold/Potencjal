services:
  # === DATABASE ===
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buildleads
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: buildleads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # === BACKEND API ===
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://buildleads:secret@db:5432/buildleads
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-long-random-string-64chars}
      - CEIDG_API_KEY=${CEIDG_API_KEY:-}
      - GUS_API_KEY=${GUS_API_KEY:-}
      - OLLAMA_URL=http://ollama:11434
      - ENV=production
    depends_on:
      - db
    restart: unless-stopped

