services:
  # === DATABASE ===
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buildleads
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: buildleads
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # === REDIS ===
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # === BACKEND API ===
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://buildleads:${POSTGRES_PASSWORD:-secret}@db:5432/buildleads
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-long-random-string-64chars}
      - CEIDG_API_KEY=${CEIDG_API_KEY:-}
      - GUS_API_KEY=${GUS_API_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@potencjal.pl}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - OLLAMA_URL=http://ollama:11434
      - ENV=production
    depends_on:
      - db
      - redis
      - ollama
    restart: unless-stopped

  # === CELERY WORKER ===
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A src.tasks.celery_app worker -l info -c 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://buildleads:${POSTGRES_PASSWORD:-secret}@db:5432/buildleads
      - REDIS_URL=redis://redis:6379/0
      - CEIDG_API_KEY=${CEIDG_API_KEY:-}
      - GUS_API_KEY=${GUS_API_KEY:-}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # === CELERY BEAT (scheduler) ===
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A src.tasks.celery_app beat -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  # === FRONTEND (Next.js) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - HOSTNAME=0.0.0.0
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  # === OLLAMA (local AI) ===
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # === NGINX (reverse proxy) ===
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8000:80"
    volumes:
      - ./nginx/buildleads.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
