name: Deploy BuildLeads

on:
  push:
    branches: [ main, 'claude/**' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy BuildLeads to server
        shell: bash
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            --exclude '__pycache__' \
            --exclude '.venv' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            buildleads/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/buildleads/"

      - name: Deploy legacy frontend (backward compat)
        shell: bash
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            mvp_osint_launcher_szybkie_sprawdzenie_potencjalu_html.html \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/html/" || true

      - name: Stop legacy Potencjal backend
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              'pkill -f "uvicorn app.main" || true
               # Stop old potencjal docker compose if running
               cd /opt/potencjal/backend 2>/dev/null && docker compose down 2>/dev/null || true'

      - name: Build and start services
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              'cd /opt/buildleads && \
               docker compose up --build -d && \
               echo "Waiting for services to start..." && \
               sleep 10 && \
               docker compose ps'

      - name: Run database migrations
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              'cd /opt/buildleads && \
               docker compose exec -T api alembic upgrade head 2>&1 || echo "Migrations: using auto-create tables"'

      - name: Verify deployment
        shell: bash
        run: |
          sleep 5
          ssh -i ~/.ssh/id_ed25519 \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              'curl -sf http://localhost/health && echo " API OK" || echo " API not ready yet"
               curl -sf http://localhost/ > /dev/null && echo " Frontend OK" || echo " Frontend not ready yet"
               docker compose -f /opt/buildleads/docker-compose.yml logs --tail=20'
