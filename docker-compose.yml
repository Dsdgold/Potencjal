version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: potencjal
      POSTGRES_PASSWORD: potencjal
      POSTGRES_DB: potencjal
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potencjal"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrantdata:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    command: >
      bash -c "cd /app/apps/api &&
      alembic upgrade head &&
      python -m app.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
    command: >
      celery -A app.celery_app worker -l info -Q default,lookups,embeddings

  beat:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    command: >
      celery -A app.celery_app beat -l info --schedule /tmp/celerybeat-schedule

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [api]
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api, web]

volumes:
  pgdata:
  qdrantdata:
